<style>
    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
    }
    /* Off-screen at natural size so innerText (used by the content extractor)
       still returns the text. Zero-size/clip yields empty innerText. */
    .content-metrics-source {
        position: absolute;
        top: 0;
        left: -100000px;
        width: 1000px;
    }
</style>
<main class="content-metrics-source">{{ preview_text }}</main>
<iframe src="{{ preview_url }}" width="100%" height="100%" style="border: none;"></iframe>
