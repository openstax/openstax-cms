<style>
    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
    }
    /* Visually hidden, but still rendered so Wagtail's content-metrics panel
       (which reads `main` innerText) can count it. Must NOT use display:none
       or visibility:hidden — those are excluded from innerText. */
    .content-metrics-source {
        position: absolute;
        width: 1px; height: 1px;
        margin: -1px; padding: 0; border: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        clip-path: inset(50%);
        white-space: nowrap;
    }
</style>
<main class="content-metrics-source">{{ preview_text }}</main>
<iframe src="{{ preview_url }}" width="100%" height="100%" style="border: none;"></iframe>
