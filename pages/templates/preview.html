<style>
    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
    }
    /* Rendered in-viewport so Wagtail's axe content extractor reads its
       innerText (axe skips display:none/visibility:hidden/off-screen), but
       covered by the opaque preview iframe layered on top. */
    .content-metrics-source {
        position: absolute;
        inset: 0;
        padding: 1rem;
        overflow: hidden;
    }
    .preview-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 1;
        background: #fff;
    }
</style>
<main class="content-metrics-source">{{ preview_text }}</main>
<iframe class="preview-frame" src="{{ preview_url }}"></iframe>
